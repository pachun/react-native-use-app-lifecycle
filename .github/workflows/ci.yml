name: CI
on:
  push:
    branches:
      - "**"
jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18.x"
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run lint
      - run: bun run prettier
      - run: bun run build
      - run: bun run test --collectCoverage
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: we-cli/coverage-badge-action@main
      - id: version
        run: |
          git fetch origin main --depth=2
          previous_commit=$(git rev-parse origin/main^1)
          git show $previous_commit:package.json > package.json.previous
          previous_version=$(jq -r '.version' package.json.previous)
          current_version=$(jq -r '.version' package.json)
          if [ "$current_version" != "$previous_version" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.check.outputs.version_changed == 'true'
    needs: check
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - run: npm install -g npm@latest
      # bun is the package manager everywhere else, but it cannot do OIDC
      # trusted publishing, so npm authenticates through GitHub's OIDC token
      # — no stored secret — and runs the one publish step.
      - run: npm publish
